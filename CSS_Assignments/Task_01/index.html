<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body
        {
            background-color: rgba(69, 152, 58, 0.886);
        }

        .container
        {
            background-color: white;
            width: 400px;
            height: 500px;
            margin: 70px auto;
            border-radius: 8px;
            box-shadow: 4px 4px 0px 0px rgba(240, 255, 79, 0.764);
        }

        .headMain
        {
        padding: 27px 27px 13px;
        font-size: 30px;
        font-family: Verdana, Geneva, Tahoma, sans-serif ;
        text-align: center;
        letter-spacing: 2px;
        color: rgb(3, 53, 3);
        font-weight: 500;
        }

        .input
        {
            width: 80%;
            padding: 10px 12px;
            margin: 7px 27px;
        }

        #textArea
        {
            width: 80%;
            margin: 7px 27px;
            padding: 40px 12px;
        }

        .btn
        {
            width: 87%;
            margin: 30px 26px 10px;
            padding: 10px 10px;
            background-color: rgba(39, 116, 29, 0.886);
            border-radius: 50px;
            color: white;
            letter-spacing: 5px;
            font-weight: 600;
            border: none;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="headMain">CONTACT US</div>
        <div>
             <input type="text" name="" id="name" placeholder="Name" class="input">
        </div>
        <div>
             <input type="text" name="" id="subject" placeholder="Subject" class="input">
        </div>
        <div>
             <input type="text" name="" id="phone" placeholder="Phone" class="input">
        </div>
        <div>
             <input type="text" name="" id="email" placeholder="Email" class="input">
        </div>
        <div>
             <input type="text" name="textArea" id="textArea"  id="textArea">
        </div>
        
        <button type="button" class="btn">SUBMIT</button>
    </div>
</body>
</html>
