<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
</head>

<body>

    <div class="form-wrapper">

        <h1>Enquiry Form</h1>
        <p class="subtitle">
        Have questions or need assistance? Fill out the form below to connect with our team and explore your opportunities.
        </p>

        <form>

            <div class="form-grid">

                <div>
                    <label>Person Name*</label>
                    <input type="text" placeholder="Person Name">
                </div>

                <div>
                    <label>Contact Number*</label>
                    <input type="text" placeholder="Contact Number">
                </div>

                <div>
                    <label>Email*</label>
                    <input type="email" placeholder="Email">
                </div>

                <div>
                    <label>Qualification*</label>
                    <input type="text" placeholder="Qualification">
                </div>

                <div class="full">
                    <label>College/School Name*</label>
                    <input type="text" placeholder="College/School Name">
                </div>

                <div>
                    <label>Year*</label>
                    <select>
                        <option>Year</option>
                        <option>1st Year</option>
                        <option>2nd Year</option>
                        <option>3rd Year</option>
                        <option>4th Year</option>
                    </select>
                </div>

                <div>
                    <label>Branch*</label>
                    <input type="text" placeholder="Branch">
                </div>

                <div>
                    <label>Interested in Which Course*</label>

                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox"> Full Stack Web Development - Placement Oriented
                        </label>
                        <label>
                            <input type="checkbox"> Data Science with Python - Placement Oriented
                        </label>
                        <label>
                            <input type="checkbox"> Data Analytics with Python - Placement Oriented
                        </label>
                        <label>
                            <input type="checkbox"> Business Analyst
                        </label>
                        <label>
                            <input type="checkbox"> Java Programming
                        </label>
                        <label>
                            <input type="checkbox"> Python Programming
                        </label>
                        <label>
                            <input type="checkbox"> C/C++ Programming
                        </label>
                        <label>
                            <input type="checkbox"> Other
                        </label>
                    </div>

                </div>

                <div class="side-group">

                    <div>
                        <label>Source of Information</label>
                        <select>
                            <option>Source of Information</option>
                            <option>Instagram</option>
                            <option>LinkedIn</option>
                            <option>Friend</option>
                            <option>Received Call</option>
                        </select>
                    </div>

                    <div>
                        <label>Name of Executive*</label>
                        <select>
                            <option>Name of Executive</option>
                            <option>Executive 1</option>
                            <option>Executive 2</option>
                        </select>
                    </div>

                </div>

            </div>

            <div class="submit-area">
            <button type="submit">Submit</button>
            </div>

        </form>

    </div>

</body>
</html>
